<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测字算事 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .container { display: flex; min-height: 100vh; }
        
        /* 侧边栏 */
        .sidebar { width: 220px; background: #1a1a2e; padding: 20px; border-right: 1px solid #2a2a4e; }
        .logo { font-size: 20px; font-weight: bold; color: #d4a574; margin-bottom: 30px; padding: 10px; }
        .nav-item { padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: #888; }
        .nav-item:hover { background: #2a2a4e; color: #d4a574; }
        .nav-item.active { background: #d4a574; color: #1a1a2e; font-weight: bold; }
        
        /* 主内容 */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .page-title { font-size: 24px; margin-bottom: 20px; color: #d4a574; }
        
        /* 卡片 */
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a4e; }
        .card-title { font-size: 16px; margin-bottom: 15px; color: #d4a574; }
        
        /* 表单 */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 6px; color: #888; font-size: 14px; }
        .form-label.required::after { content: ' *'; color: #ff4757; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a2a4e; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
        .form-textarea { min-height: 200px; font-family: monospace; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: #d4a574; }
        .form-input.error, .form-textarea.error { border-color: #ff4757; }
        
        /* 按钮 */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: #d4a574; color: #1a1a2e; }
        .btn-primary:hover:not(:disabled) { background: #e5b785; }
        .btn-secondary { background: #2a2a4e; color: #e0e0e0; }
        .btn-secondary:hover:not(:disabled) { background: #3a3a5e; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover:not(:disabled) { background: #ff6b7a; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        
        /* Loading spinner */
        .spinner { width: 16px; height: 16px; border: 2px solid #ffffff33; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 表格 */
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a4e; }
        .table th { color: #d4a574; font-weight: bold; }
        .table tr:hover { background: #2a2a4e; }
        
        /* 徽章 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-active { background: #2ed573; color: #1a1a2e; }
        .badge-inactive { background: #57606f; color: white; }
        
        /* 变量提示 */
        .var-tip { background: #2a2a4e; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; color: #888; }
        .var-tip code { color: #d4a574; background: #0f0f1a; padding: 2px 6px; border-radius: 4px; }
        
        /* 预览 */
        .preview-box { background: #0f0f1a; padding: 15px; border-radius: 6px; border: 1px solid #2a2a4e; white-space: pre-wrap; font-size: 13px; line-height: 1.6; max-height: 300px; overflow-y: auto; }
        
        /* 分页 */
        .pagination { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
        .pagination button { padding: 8px 14px; }
        .pagination-info { color: #888; font-size: 14px; margin-left: auto; }
        
        /* Toast通知 */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast.success { background: #2ed573; }
        .toast.error { background: #ff4757; }
        .toast.info { background: #3742fa; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* 搜索框 */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { flex: 1; max-width: 300px; }
        
        /* 确认对话框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; padding: 24px; border-radius: 12px; max-width: 400px; width: 90%; }
        .modal-title { font-size: 18px; margin-bottom: 12px; color: #d4a574; }
        .modal-content { color: #888; margin-bottom: 20px; line-height: 1.6; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        
        /* 历史详情 */
        .history-detail { background: #0f0f1a; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .history-section { margin-bottom: 15px; }
        .history-label { color: #d4a574; font-size: 12px; margin-bottom: 5px; }
        .history-content { font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">🔮 测字管理后台</div>
            <div class="nav-item active" data-page="prompt" onclick="showPage('prompt')">📝 Prompt配置</div>
            <div class="nav-item" data-page="history" onclick="showPage('history')">📜 历史记录</div>
            <div class="nav-item" data-page="models" onclick="showPage('models')">🤖 模型管理</div>
        </div>
        
        <div class="main">
            <!-- Prompt配置页面 -->
            <div class="page active" id="page-prompt">
                <div class="page-title">📝 Prompt配置</div>
                
                <div class="card">
                    <div class="card-title">编辑Prompt模板</div>
                    <div class="var-tip">
                        可用变量: <code>{char}</code> (所测之字) <code>{question}</code> (所问之事) <code>{direction}</code> (方位) <code>{time}</code> (时辰) <code>{day}</code> (当天日期)
                    </div>
                    <div class="form-group">
                        <label class="form-label required">配置名称</label>
                        <input type="text" class="form-input" id="promptName" placeholder="例如：默认模板">
                        <span class="error-message" id="promptNameError" style="color: #ff4757; font-size: 12px; display: none;">请输入配置名称</span>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">Prompt模板内容</label>
                        <textarea class="form-textarea" id="promptTemplate" placeholder="输入Prompt模板..."></textarea>
                        <span class="error-message" id="promptTemplateError" style="color: #ff4757; font-size: 12px; display: none;">请输入模板内容</span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" id="savePromptBtn" onclick="savePrompt()">
                            <span class="btn-text">保存配置</span>
                        </button>
                        <button class="btn btn-secondary" onclick="previewPrompt()">预览</button>
                        <button class="btn btn-secondary" onclick="loadActivePrompt()">加载当前</button>
                        <button class="btn btn-secondary" onclick="clearPromptForm()">清空</button>
                    </div>
                </div>
                
                <div class="card" id="previewCard" style="display:none;">
                    <div class="card-title">预览效果</div>
                    <div class="preview-box" id="previewContent"></div>
                </div>
                
                <div class="card">
                    <div class="card-title">已有配置</div>
                    <div id="promptListContainer">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="promptList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- 历史记录页面 -->
            <div class="page" id="page-history">
                <div class="page-title">📜 测字历史记录</div>
                <div class="card">
                    <div class="search-box">
                        <input type="text" class="form-input" id="historySearch" placeholder="搜索字或问题..." onkeypress="if(event.key==='Enter')loadHistory(1)">
                        <button class="btn btn-secondary" onclick="loadHistory(1)">搜索</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('historySearch').value=''; loadHistory(1)">重置</button>
                    </div>
                    <div id="historyListContainer">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>字</th>
                                    <th>问题</th>
                                    <th>方位</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="historyList"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="historyPagination"></div>
                </div>
            </div>
            
            <!-- 模型管理页面 -->
            <div class="page" id="page-models">
                <div class="page-title">🤖 模型管理</div>
                
                <div class="card">
                    <div class="card-title" id="modelFormTitle">添加模型</div>
                    <input type="hidden" id="modelId">
                    <div class="form-group">
                        <label class="form-label required">模型名称</label>
                        <input type="text" class="form-input" id="modelName" placeholder="例如：MiniMax">
                    </div>
                    <div class="form-group">
                        <label class="form-label required">提供商</label>
                        <select class="form-select" id="modelProvider">
                            <option value="minimax">MiniMax</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">API端点</label>
                        <input type="text" class="form-input" id="modelEndpoint" placeholder="例如：https://api.minimaxi.com/anthropic/v1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">模型名称</label>
                        <input type="text" class="form-input" id="modelModelName" placeholder="例如：MiniMax-M2.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="password" class="form-input" id="modelApiKey" placeholder="API密钥（编辑时留空表示不修改）">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" id="saveModelBtn" onclick="saveModel()">
                            <span class="btn-text">保存模型</span>
                        </button>
                        <button class="btn btn-secondary" onclick="clearModelForm()">清空</button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">已有模型</div>
                    <div id="modelListContainer">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>提供商</th>
                                    <th>模型</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="modelList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- 确认对话框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-title" id="confirmTitle">确认</div>
            <div class="modal-content" id="confirmContent">确定执行此操作吗？</div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">确定</button>
            </div>
        </div>
    </div>
    
    <script>
    let currentPage = 1;
    let confirmCallback = null;
    
    // Toast通知
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        toast.innerHTML = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // 确认对话框
    function showConfirm(title, content, callback) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmContent').textContent = content;
        confirmCallback = callback;
        document.getElementById('confirmModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('confirmModal').classList.remove('active');
        confirmCallback = null;
    }
    
    function confirmAction() {
        if (confirmCallback) {
            confirmCallback();
            closeModal();
        }
    }
    
    // 设置按钮加载状态
    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        const textSpan = btn.querySelector('.btn-text');
        if (loading) {
            btn.disabled = true;
            const originalText = textSpan.textContent;
            btn.dataset.originalText = originalText;
            textSpan.innerHTML = '<span class="spinner"></span> 处理中...';
        } else {
            btn.disabled = false;
            textSpan.textContent = btn.dataset.originalText || '保存';
        }
    }
    
    // 页面切换
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.querySelector('[data-page="' + page + '"]').classList.add('active');
        
        if (page === 'prompt') loadPrompts();
        if (page === 'history') loadHistory();
        if (page === 'models') loadModels();
    }
    
    // ========== Prompt管理 ==========
    async function loadPrompts() {
        try {
            const res = await fetch('/api/admin/prompt/list');
            const data = await res.json();
            
            if (!data || data.length === 0) {
                document.getElementById('promptListContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>暂无Prompt配置</div>
                    </div>`;
                return;
            }
            
            let html = '';
            data.forEach(p => {
                html += `<tr>
                    <td>${p.id}</td>
                    <td>${escapeHtml(p.name)}</td>
                    <td><span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? '应用中' : '未启用'}</span></td>
                    <td>
                        ${!p.is_active ? `<button class="btn btn-primary btn-small" onclick="activatePrompt(${p.id})">启用</button>` : ''}
                        <button class="btn btn-secondary btn-small" onclick="editPrompt(${p.id}, '${escapeHtml(p.name)}')">编辑</button>
                        <button class="btn btn-danger btn-small" onclick="deletePrompt(${p.id}, '${escapeHtml(p.name)}')">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById('promptList').innerHTML = html;
        } catch (e) {
            showToast('加载Prompt列表失败: ' + e.message, 'error');
        }
    }
    
    async function loadActivePrompt() {
        try {
            const res = await fetch('/api/admin/prompt/list');
            const data = await res.json();
            const active = data.find(p => p.is_active);
            if (active) {
                document.getElementById('promptName').value = active.name;
                document.getElementById('promptTemplate').value = active.template;
                document.getElementById('promptName').dataset.id = active.id;
            } else {
                showToast('没有找到活跃的Prompt配置', 'info');
            }
        } catch (e) {
            showToast('加载当前Prompt失败: ' + e.message, 'error');
        }
    }
    
    function validatePromptForm() {
        let valid = true;
        const name = document.getElementById('promptName').value.trim();
        const template = document.getElementById('promptTemplate').value.trim();
        
        document.getElementById('promptName').classList.toggle('error', !name);
        document.getElementById('promptTemplate').classList.toggle('error', !template);
        document.getElementById('promptNameError').style.display = name ? 'none' : 'inline';
        document.getElementById('promptTemplateError').style.display = template ? 'none' : 'inline';
        
        return name && template;
    }
    
    async function savePrompt() {
        if (!validatePromptForm()) return;
        
        setLoading('savePromptBtn', true);
        
        const name = document.getElementById('promptName').value.trim();
        const template = document.getElementById('promptTemplate').value.trim();
        const id = document.getElementById('promptName').dataset.id;
        
        try {
            const res = await fetch('/api/admin/prompt/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id ? parseInt(id) : null, name, template})
            });
            
            const result = await res.json();
            if (result.success) {
                showToast('保存成功！', 'success');
                clearPromptForm();
                loadPrompts();
            } else {
                showToast('保存失败: ' + (result.error || '未知错误'), 'error');
            }
        } catch(e) {
            showToast('保存出错: ' + e.message, 'error');
        } finally {
            setLoading('savePromptBtn', false);
        }
    }
    
    async function editPrompt(id, name) {
        try {
            const res = await fetch('/api/admin/prompt/list');
            const data = await res.json();
            const prompt = data.find(p => p.id === id);
            if (prompt) {
                document.getElementById('promptName').value = prompt.name;
                document.getElementById('promptName').dataset.id = prompt.id;
                document.getElementById('promptTemplate').value = prompt.template;
                document.getElementById('previewCard').style.display = 'none';
            }
        } catch (e) {
            showToast('加载Prompt失败: ' + e.message, 'error');
        }
    }
    
    async function activatePrompt(id) {
        try {
            const res = await fetch('/api/admin/prompt/set_active', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            const result = await res.json();
            if (result.success) {
                showToast('启用成功！', 'success');
                loadPrompts();
            } else {
                showToast('启用失败: ' + (result.error || '未知错误'), 'error');
            }
        } catch (e) {
            showToast('启用出错: ' + e.message, 'error');
        }
    }
    
    function deletePrompt(id, name) {
        showConfirm('确认删除', `确定要删除Prompt配置"${name}"吗？`, async () => {
            try {
                const res = await fetch('/api/admin/prompt/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id})
                });
                const result = await res.json();
                if (result.success) {
                    showToast('删除成功！', 'success');
                    loadPrompts();
                } else {
                    showToast('删除失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('删除出错: ' + e.message, 'error');
            }
        });
    }
    
    function clearPromptForm() {
        document.getElementById('promptName').value = '';
        document.getElementById('promptName').dataset.id = '';
        document.getElementById('promptTemplate').value = '';
        document.getElementById('promptName').classList.remove('error');
        document.getElementById('promptTemplate').classList.remove('error');
        document.getElementById('promptNameError').style.display = 'none';
        document.getElementById('promptTemplateError').style.display = 'none';
        document.getElementById('previewCard').style.display = 'none';
    }
    
    async function previewPrompt() {
        const template = document.getElementById('promptTemplate').value;
        if (!template) {
            showToast('请先输入模板内容', 'info');
            return;
        }
        
        const variables = {
            char: '测',
            question: '事业发展',
            direction: '南',
            time: '辰时',
            day: new Date().toLocaleDateString()
        };
        
        try {
            const res = await fetch('/api/admin/prompt/preview', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({template, variables})
            });
            const result = await res.json();
            document.getElementById('previewCard').style.display = 'block';
            document.getElementById('previewContent').textContent = result.preview || '预览失败';
            document.getElementById('previewContent').scrollIntoView({behavior: 'smooth'});
        } catch (e) {
            showToast('预览失败: ' + e.message, 'error');
        }
    }
    
    // ========== 历史记录 ==========
    async function loadHistory(page = 1) {
        currentPage = page;
        const search = document.getElementById('historySearch').value.trim();
        
        try {
            let url = `/api/admin/history/list?page=${page}&limit=20`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            if (!data.data || data.data.length === 0) {
                document.getElementById('historyListContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📜</div>
                        <div>${search ? '没有找到匹配的记录' : '暂无历史记录'}</div>
                    </div>`;
                document.getElementById('historyPagination').innerHTML = '';
                return;
            }
            
            let html = '';
            data.data.forEach(h => {
                const timeInfo = h.time_info || '-';
                html += `<tr>
                    <td>${h.id}</td>
                    <td>${h.char || '-'}</td>
                    <td>${escapeHtml(h.question || '-').substring(0, 20)}${h.question && h.question.length > 20 ? '...' : ''}</td>
                    <td>${h.direction || '-'}</td>
                    <td>${timeInfo}</td>
                    <td>
                        <button class="btn btn-secondary btn-small" onclick="viewHistory(${h.id})">查看</button>
                        <button class="btn btn-danger btn-small" onclick="deleteHistory(${h.id})">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById('historyList').innerHTML = html;
            
            // 分页
            const totalPages = Math.ceil(data.total / data.limit);
            let paging = '';
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
                        paging += `<button class="btn ${i === page ? 'btn-primary' : 'btn-secondary'} btn-small" onclick="loadHistory(${i})">${i}</button>`;
                    } else if (i === page - 2 || i === page + 2) {
                        paging += '<span style="color:#888">...</span>';
                    }
                }
                paging += `<span class="pagination-info">共 ${data.total} 条记录</span>`;
            }
            document.getElementById('historyPagination').innerHTML = paging;
        } catch (e) {
            showToast('加载历史记录失败: ' + e.message, 'error');
        }
    }
    
    async function viewHistory(id) {
        try {
            const res = await fetch(`/api/admin/history/${id}`);
            const h = await res.json();
            
            if (!h || !h.id) {
                showToast('记录不存在', 'error');
                return;
            }
            
            const content = `
                <div class="history-detail">
                    <div class="history-section">
                        <div class="history-label">用户输入</div>
                        <div class="history-content">字: ${h.char || '-'} | 问题: ${escapeHtml(h.question || '-')} | 方位: ${h.direction || '-'} | 时辰: ${h.time_info || '-'}</div>
                    </div>
                    <div class="history-section">
                        <div class="history-label">发送给LLM的Prompt</div>
                        <div class="history-content">${escapeHtml(h.prompt || '-')}</div>
                    </div>
                    <div class="history-section">
                        <div class="history-label">LLM原始返回</div>
                        <div class="history-content">${escapeHtml(h.llm_response || '-')}</div>
                    </div>
                    <div class="history-section">
                        <div class="history-label">前端展示结果</div>
                        <div class="history-content">${escapeHtml(h.display_result || '-')}</div>
                    </div>
                </div>`;
            
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<!DOCTYPE html>
                <html><head><title>测字记录详情 #${h.id}</title>
                <style>body{background:#0f0f1a;color:#e0e0e0;padding:20px;font-family:sans-serif;line-height:1.6}</style>
                </head><body>${content}</body></html>`);
        } catch (e) {
            showToast('查看详情失败: ' + e.message, 'error');
        }
    }
    
    function deleteHistory(id) {
        showConfirm('确认删除', '确定要删除这条历史记录吗？此操作不可恢复。', async () => {
            try {
                const res = await fetch('/api/admin/history/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id})
                });
                const result = await res.json();
                if (result.success) {
                    showToast('删除成功！', 'success');
                    loadHistory(currentPage);
                } else {
                    showToast('删除失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('删除出错: ' + e.message, 'error');
            }
        });
    }
    
    // ========== 模型管理 ==========
    async function loadModels() {
        try {
            const res = await fetch('/api/admin/models/list');
            const data = await res.json();
            
            if (!data || data.length === 0) {
                document.getElementById('modelListContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <div>暂无模型配置</div>
                    </div>`;
                return;
            }
            
            let html = '';
            data.forEach(m => {
                html += `<tr>
                    <td>${m.id}</td>
                    <td>${escapeHtml(m.name)}</td>
                    <td>${m.provider}</td>
                    <td>${m.model_name || '-'}</td>
                    <td><span class="badge ${m.is_active ? 'badge-active' : 'badge-inactive'}">${m.is_active ? '应用中' : '未启用'}</span></td>
                    <td>
                        ${!m.is_active ? `<button class="btn btn-primary btn-small" onclick="activateModel(${m.id})">启用</button>` : ''}
                        <button class="btn btn-secondary btn-small" onclick="editModel(${m.id})">编辑</button>
                        <button class="btn btn-danger btn-small" onclick="deleteModel(${m.id}, '${escapeHtml(m.name)}')">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById('modelList').innerHTML = html;
        } catch (e) {
            showToast('加载模型列表失败: ' + e.message, 'error');
        }
    }
    
    function validateModelForm() {
        const name = document.getElementById('modelName').value.trim();
        const provider = document.getElementById('modelProvider').value;
        
        document.getElementById('modelName').classList.toggle('error', !name);
        
        return name && provider;
    }
    
    async function saveModel() {
        if (!validateModelForm()) {
            showToast('请填写模型名称', 'error');
            return;
        }
        
        setLoading('saveModelBtn', true);
        
        const id = document.getElementById('modelId').value;
        const name = document.getElementById('modelName').value.trim();
        const provider = document.getElementById('modelProvider').value;
        const endpoint = document.getElementById('modelEndpoint').value.trim();
        const model_name = document.getElementById('modelModelName').value.trim();
        const api_key = document.getElementById('modelApiKey').value;
        
        try {
            const res = await fetch('/api/admin/models/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id ? parseInt(id) : null, name, provider, endpoint, model_name, api_key})
            });
            
            const result = await res.json();
            if (result.success) {
                showToast(id ? '更新成功！' : '保存成功！', 'success');
                clearModelForm();
                loadModels();
            } else {
                showToast('保存失败: ' + (result.error || '未知错误'), 'error');
            }
        } catch (e) {
            showToast('保存出错: ' + e.message, 'error');
        } finally {
            setLoading('saveModelBtn', false);
        }
    }
    
    async function editModel(id) {
        try {
            const res = await fetch(`/api/admin/models/${id}`);
            const m = await res.json();
            
            if (m.error) {
                showToast('模型不存在', 'error');
                return;
            }
            
            document.getElementById('modelId').value = m.id;
            document.getElementById('modelName').value = m.name;
            document.getElementById('modelProvider').value = m.provider;
            document.getElementById('modelEndpoint').value = m.endpoint || '';
            document.getElementById('modelModelName').value = m.model_name || '';
            document.getElementById('modelApiKey').value = ''; // Don't show API key
            document.getElementById('modelFormTitle').textContent = '编辑模型';
            document.getElementById('modelApiKey').placeholder = 'API密钥（留空表示不修改）';
        } catch (e) {
            showToast('加载模型失败: ' + e.message, 'error');
        }
    }
    
    async function activateModel(id) {
        try {
            const res = await fetch('/api/admin/models/set_active', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            const result = await res.json();
            if (result.success) {
                showToast('启用成功！', 'success');
                loadModels();
            } else {
                showToast('启用失败: ' + (result.error || '未知错误'), 'error');
            }
        } catch (e) {
            showToast('启用出错: ' + e.message, 'error');
        }
    }
    
    function deleteModel(id, name) {
        showConfirm('确认删除', `确定要删除模型"${name}"吗？`, async () => {
            try {
                const res = await fetch('/api/admin/models/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id})
                });
                const result = await res.json();
                if (result.success) {
                    showToast('删除成功！', 'success');
                    loadModels();
                } else {
                    showToast('删除失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('删除出错: ' + e.message, 'error');
            }
        });
    }
    
    function clearModelForm() {
        document.getElementById('modelId').value = '';
        document.getElementById('modelName').value = '';
        document.getElementById('modelProvider').value = 'minimax';
        document.getElementById('modelEndpoint').value = '';
        document.getElementById('modelModelName').value = '';
        document.getElementById('modelApiKey').value = '';
        document.getElementById('modelFormTitle').textContent = '添加模型';
        document.getElementById('modelApiKey').placeholder = 'API密钥';
        document.getElementById('modelName').classList.remove('error');
    }
    
    // 工具函数
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // 初始化
    loadPrompts();
    </script>
</body>
</html>
