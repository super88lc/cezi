<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字测算 - AI智能测字</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #6366f1;
            --primary-ligh
        /* 深度思考过程显示 */
        .thinking-process {
            padding: 20px;
            text-align: left;
        }
        
        .thinking-header {
            font-size: 18px;
            color: #f59e0b;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        
        .thinking-steps {
            font-size: 14px;
            line-height: 2;
        }
        
        .thinking-step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(99,102,241,0.1);
            border-radius: 12px;
            border-left: 3px solid #6366f1;
            animation: fadeInStep 0.5s ease-out;
        }
        
        .thinking-step.active {
            border-left-color: #f59e0b;
            background: rgba(245,158,11,0.1);
        }
        
        .thinking-step.done {
            border-left-color: #22c55e;
            background: rgba(34,197,94,0.1);
        }
        
        .step-icon {
            font-size: 18px;
            margin-right: 10px;
            min-width: 24px;
        }
        
        .step-text {
            flex: 1;
        }
        
        .step-title {
            color: #f8fafc;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .step-detail {
            color: #94a3b8;
            font-size: 12px;
        }
        
        @keyframes fadeInStep {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style></body></html>
